<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="daily"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#d4957a"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<title>daily</title>
<style>
:root {
  --serif: Georgia,"Times New Roman","Songti SC","SimSun",serif;
  --sans: -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
  --cream:#fef6ec;--peach:#fde8e0;--rose:#e8a598;--terra:#d4957a;
  --brown:#5a3e36;--mid:#8a6050;--light:#c0a090;--lavender:#f0e6f6;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--cream);color:var(--brown);overscroll-behavior:none;}
#screen-login,#screen-app{position:fixed;inset:0;transition:opacity .3s,transform .3s;}
.hidden{opacity:0!important;pointer-events:none!important;transform:translateY(16px)!important;}
#screen-login{
  background:linear-gradient(160deg,var(--cream) 0%,var(--peach) 55%,var(--lavender) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 28px;padding-top:calc(var(--safe-top) + 40px);
}
.login-icon{font-size:4rem;margin-bottom:10px;}
.login-brand{font-family:var(--serif);font-size:2.8rem;color:var(--brown);
  letter-spacing:-.01em;margin-bottom:6px;font-style:italic;}
.login-tag{font-size:.82rem;color:var(--light);margin-bottom:48px;letter-spacing:.08em;}
.login-box{width:100%;max-width:360px;}
.fl{font-size:.68rem;color:var(--mid);letter-spacing:.09em;text-transform:uppercase;margin-bottom:9px;display:block;}
.login-input{width:100%;border:1.5px solid rgba(212,149,122,.3);border-radius:18px;
  padding:16px 18px;font-size:1rem;font-family:var(--sans);
  background:rgba(255,255,255,.72);color:var(--brown);outline:none;-webkit-appearance:none;
  transition:border-color .2s,box-shadow .2s;}
.login-input:focus{border-color:var(--terra);box-shadow:0 0 0 4px rgba(212,149,122,.14);}
.login-btn{margin-top:13px;width:100%;padding:16px;border:none;border-radius:18px;
  background:linear-gradient(135deg,var(--rose),var(--terra));color:#fff;
  font-size:.98rem;font-family:var(--sans);font-weight:600;cursor:pointer;
  box-shadow:0 8px 24px rgba(212,149,122,.42);-webkit-appearance:none;letter-spacing:.04em;}
.login-btn:active{opacity:.88;}
.login-note{margin-top:20px;font-size:.72rem;color:var(--light);text-align:center;line-height:1.7;}
.login-note span{display:inline-block;background:rgba(212,149,122,.1);border-radius:10px;padding:8px 14px;}
#screen-app{display:flex;flex-direction:column;
  background:linear-gradient(160deg,var(--cream) 0%,var(--peach) 52%,var(--lavender) 100%);}
.status-bar{height:var(--safe-top);flex-shrink:0;}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 7px;flex-shrink:0;}
.app-brand{font-family:var(--serif);font-size:1.6rem;color:var(--brown);
  letter-spacing:-.01em;font-style:italic;}
.user-pill{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.72);
  border-radius:50px;padding:7px 14px;box-shadow:0 2px 10px rgba(0,0,0,.07);cursor:pointer;}
.user-pill:active{background:rgba(255,220,210,.8);}
.u-dot{width:9px;height:9px;border-radius:50%;}
.u-name{font-size:.8rem;color:var(--brown);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 13px 14px;}
.card{background:rgba(255,255,255,.78);border-radius:22px;padding:17px;
  box-shadow:0 5px 24px rgba(180,120,100,.11);margin-bottom:11px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-month{font-family:var(--serif);font-size:1.08rem;color:var(--brown);}
.nav-arrow{background:rgba(240,220,210,.5);border:none;border-radius:11px;
  width:34px;height:34px;font-size:1.1rem;color:var(--mid);cursor:pointer;
  display:flex;align-items:center;justify-content:center;}
.nav-arrow:active{background:rgba(212,149,122,.25);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-wday{text-align:center;font-size:.6rem;color:var(--light);padding:1px 0 6px;}
.day-cell{display:flex;flex-direction:column;align-items:center;
  border-radius:11px;cursor:pointer;padding:4px 1px 3px;min-height:50px;
  user-select:none;transition:background .1s;}
.day-cell:active{transform:scale(.92);}
.day-cell.today{background:rgba(232,165,152,.18);}
.day-cell.selected{background:linear-gradient(135deg,var(--rose),var(--terra))!important;
  box-shadow:0 4px 12px rgba(212,149,122,.42);}
.day-cell.selected .dnum{color:#fff!important;font-weight:700;}
.day-cell.empty{cursor:default;pointer-events:none;}
.dnum{font-size:.73rem;color:var(--brown);line-height:1;margin-bottom:2px;}
.dnum.is-today{color:var(--terra);font-weight:700;}
.emoji-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;width:100%;flex:1;}
.emoji-grid.s1{grid-template-columns:1fr;}
.cell-emoji{font-size:.82rem;line-height:1;text-align:center;
  background:rgba(255,255,255,.42);border-radius:4px;padding:1px 0;}
.day-cell.selected .cell-emoji{background:rgba(255,255,255,.2);}
.more-badge{font-size:.48rem;color:var(--mid);text-align:center;
  background:rgba(255,255,255,.5);border-radius:3px;padding:1px;grid-column:1/-1;}
.day-cell.selected .more-badge{color:rgba(255,255,255,.8);}
.legend-strip{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.legend-item{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.6);border-radius:50px;padding:3px 9px;}
.legend-dot{width:6px;height:6px;border-radius:50%;}
.legend-name{font-size:.67rem;color:var(--mid);}
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.day-title{font-family:var(--serif);font-size:.98rem;color:var(--brown);}
.day-count{font-size:.71rem;color:var(--light);}
.add-fab{width:100%;padding:12px;border:1.5px dashed rgba(212,149,122,.48);
  border-radius:14px;background:transparent;color:var(--terra);
  font-size:.85rem;font-family:var(--sans);cursor:pointer;margin-bottom:10px;}
.add-fab:active{background:rgba(212,149,122,.1);}
.entry-card{background:rgba(255,248,244,.9);border-radius:14px;padding:12px;
  margin-bottom:8px;border-left:3px solid;cursor:pointer;}
.entry-card:active{transform:scale(.98);}
.ec-top{display:flex;align-items:center;gap:9px;}
.ec-emoji{font-size:1.4rem;}
.ec-info{flex:1;}
.ec-author{font-size:.77rem;font-weight:600;}
.ec-meta{font-size:.69rem;color:var(--mid);margin-top:1px;}
.ec-note{font-size:.8rem;color:#6a4e45;margin-top:6px;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
.section-label{font-size:.65rem;color:var(--light);letter-spacing:.08em;text-transform:uppercase;margin:0 0 8px;}
.feed-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.6);
  border-radius:13px;padding:10px 12px;margin-bottom:7px;cursor:pointer;}
.feed-item:active{transform:scale(.98);}
.fi-emoji{font-size:1.15rem;}
.fi-main{flex:1;min-width:0;}
.fi-author{font-size:.77rem;font-weight:600;}
.fi-note{font-size:.72rem;color:var(--mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px;}
.fi-right{text-align:right;flex-shrink:0;}
.fi-date{font-size:.68rem;color:var(--light);}
.fi-time{font-size:.66rem;color:var(--light);margin-top:1px;}
.profile-avatar{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-family:var(--serif);font-size:1.7rem;color:#fff;margin:4px auto 12px;}
.profile-name{text-align:center;font-family:var(--serif);font-size:1.15rem;color:var(--brown);margin-bottom:4px;}
.profile-sub{text-align:center;font-size:.76rem;color:var(--light);margin-bottom:22px;}
.stat-row{display:flex;gap:8px;margin-bottom:16px;}
.stat-box{flex:1;background:rgba(255,255,255,.7);border-radius:15px;padding:14px 8px;text-align:center;}
.stat-num{font-family:var(--serif);font-size:1.45rem;color:var(--terra);}
.stat-lbl{font-size:.65rem;color:var(--light);margin-top:2px;}
.action-btn{width:100%;padding:13px;border-radius:14px;border:1.5px solid rgba(212,149,122,.27);
  background:transparent;color:var(--mid);font-family:var(--sans);font-size:.86rem;
  cursor:pointer;text-align:left;display:flex;align-items:center;gap:11px;margin-bottom:8px;}
.action-btn:active{background:rgba(212,149,122,.1);}
.aicon{font-size:1rem;}
.logout-red{color:#d06060;border-color:rgba(200,80,80,.2);}
.bottom-nav{display:flex;border-top:1px solid rgba(212,149,122,.12);
  background:rgba(255,252,248,.95);padding-bottom:calc(var(--safe-bot) + 2px);flex-shrink:0;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:9px 4px;cursor:pointer;color:var(--light);border:none;background:none;font-family:var(--sans);}
.nav-tab.active{color:var(--terra);}
.nav-icon{font-size:1.25rem;line-height:1;}
.nav-label{font-size:.58rem;margin-top:3px;}
.modal-bg{position:fixed;inset:0;background:rgba(80,50,40,.35);
  display:flex;align-items:flex-end;justify-content:center;z-index:200;transition:opacity .25s;}
.modal-bg.hidden{opacity:0!important;pointer-events:none!important;}
.modal-sheet{background:#fff9f5;border-radius:26px 26px 0 0;
  padding:0 19px;padding-bottom:calc(var(--safe-bot) + 20px);
  width:100%;max-height:91vh;overflow-y:auto;
  transform:translateY(0);transition:transform .3s cubic-bezier(.32,.72,0,1);-webkit-overflow-scrolling:touch;}
.modal-bg.hidden .modal-sheet{transform:translateY(100%);}
.modal-handle{width:36px;height:4px;background:rgba(0,0,0,.1);border-radius:2px;margin:12px auto 17px;}
.modal-title{font-family:var(--serif);font-size:1.08rem;color:var(--brown);margin-bottom:18px;}
.form-label{font-size:.67rem;color:var(--mid);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;display:block;}
.form-block{margin-bottom:16px;}
.mood-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.mood-btn{border:1.5px solid transparent;border-radius:12px;padding:9px 3px;
  background:rgba(240,225,215,.35);cursor:pointer;text-align:center;
  display:flex;flex-direction:column;align-items:center;}
.mood-btn:active{transform:scale(.92);}
.mood-btn.active{border-color:var(--terra);background:rgba(232,165,152,.22);}
.mb-emoji{font-size:1.5rem;}
.mb-label{font-size:.61rem;color:var(--mid);margin-top:3px;}
.input-field{width:100%;border:1.5px solid rgba(212,149,122,.27);border-radius:13px;
  padding:12px 14px;font-size:.93rem;font-family:var(--sans);
  background:rgba(255,248,244,.8);color:var(--brown);outline:none;-webkit-appearance:none;transition:border-color .2s;}
.input-field:focus{border-color:var(--terra);}
textarea.input-field{resize:none;min-height:80px;line-height:1.55;}
.btn-row{display:flex;gap:8px;margin-top:5px;}
.btn-primary{flex:1;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--rose),var(--terra));color:#fff;
  font-size:.9rem;font-family:var(--sans);font-weight:600;cursor:pointer;
  box-shadow:0 5px 16px rgba(212,149,122,.35);}
.btn-primary:active{opacity:.88;}
.btn-secondary{padding:14px 16px;border:1.5px solid rgba(212,149,122,.27);border-radius:14px;
  background:transparent;color:var(--mid);font-family:var(--sans);font-size:.88rem;cursor:pointer;}
.btn-secondary:active{background:rgba(240,220,210,.3);}
.btn-danger{padding:14px 14px;border:1.5px solid rgba(220,80,80,.22);border-radius:14px;
  background:transparent;color:#d06060;font-family:var(--sans);font-size:.85rem;cursor:pointer;}
.btn-danger:active{background:rgba(220,80,80,.07);}
.ve-center{text-align:center;padding:6px 0 18px;}
.ve-emoji{font-size:3.2rem;}
.ve-mood{font-family:var(--serif);font-size:.98rem;color:var(--brown);margin-top:6px;}
.ve-box{background:rgba(240,225,215,.22);border-radius:14px;padding:14px;margin-bottom:16px;}
.ve-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.ve-author{font-size:.78rem;font-weight:600;}
.ve-time{font-size:.74rem;color:var(--mid);}
.ve-text{font-size:.86rem;color:var(--brown);line-height:1.65;white-space:pre-wrap;}
.ve-empty{font-size:.82rem;color:var(--light);font-style:italic;}
.sync-tabs{display:flex;background:rgba(240,220,210,.3);border-radius:11px;padding:3px;margin-bottom:16px;}
.sync-tab{flex:1;padding:8px;text-align:center;border-radius:9px;border:none;
  background:transparent;font-size:.78rem;font-family:var(--sans);color:var(--mid);cursor:pointer;}
.sync-tab.active{background:#fff;color:var(--brown);box-shadow:0 2px 7px rgba(0,0,0,.07);font-weight:600;}
.sync-code-box{background:rgba(240,225,215,.28);border-radius:12px;padding:12px 14px;
  font-family:monospace;font-size:.73rem;color:var(--brown);word-break:break-all;
  line-height:1.55;max-height:100px;overflow-y:auto;margin-bottom:10px;}
.sync-note{font-size:.75rem;color:var(--light);line-height:1.65;margin-bottom:12px;}
.toast{position:fixed;bottom:calc(var(--safe-bot) + 68px);left:50%;
  transform:translateX(-50%) translateY(0);background:rgba(90,62,54,.92);color:#fff;
  padding:9px 20px;border-radius:50px;font-size:.82rem;z-index:999;
  transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;}
.toast.hidden{opacity:0;transform:translateX(-50%) translateY(10px);}
</style>
</head>
<body>
<div id="screen-login">
  <div class="login-icon">📖</div>
  <div class="login-brand">daily</div>
  <div class="login-tag">record every mood · every moment</div>
  <div class="login-box">
    <label class="fl">你的昵称</label>
    <input class="login-input" id="loginInput" placeholder="输入昵称…" maxlength="20" autocomplete="off" inputmode="text"/>
    <button class="login-btn" onclick="doLogin()">开始记录 →</button>
    <div class="login-note"><span>🔗 共享日历模式 · 所有成员可互相查看记录</span></div>
  </div>
</div>

<div id="screen-app" class="hidden">
  <div class="status-bar"></div>
  <div class="topnav">
    <span class="app-brand">daily</span>
    <div class="user-pill" onclick="showTab('profile')">
      <div class="u-dot" id="topDot"></div>
      <span class="u-name" id="topName"></span>
    </div>
  </div>
  <div class="scroll-area" id="scrollArea">
    <div id="tab-calendar">
      <div class="card">
        <div class="cal-nav">
          <button class="nav-arrow" onclick="changeMonth(-1)">‹</button>
          <span class="cal-month" id="calTitle"></span>
          <button class="nav-arrow" onclick="changeMonth(1)">›</button>
        </div>
        <div class="legend-strip" id="calLegend"></div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
      <div class="card" id="dayPanel" style="display:none">
        <div class="day-header">
          <span class="day-title" id="dayTitle"></span>
          <span class="day-count" id="dayCount"></span>
        </div>
        <button class="add-fab" onclick="openAdd()">＋ 添加今天的记录</button>
        <div id="dayEntries"></div>
      </div>
      <div class="card">
        <div class="section-label">最近动态</div>
        <div id="feedList"></div>
      </div>
    </div>
    <div id="tab-feed" style="display:none">
      <div class="card">
        <div class="section-label">全部记录</div>
        <div id="allFeedList"></div>
      </div>
    </div>
    <div id="tab-profile" style="display:none">
      <div class="card">
        <div class="profile-avatar" id="profileAvatar"></div>
        <div class="profile-name" id="profileName"></div>
        <div class="profile-sub">daily 共享日历成员</div>
        <div class="stat-row">
          <div class="stat-box"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">总记录</div></div>
          <div class="stat-box"><div class="stat-num" id="statMine">0</div><div class="stat-lbl">我的</div></div>
          <div class="stat-box"><div class="stat-num" id="statDays">0</div><div class="stat-lbl">记录天数</div></div>
        </div>
        <button class="action-btn" onclick="openSync()"><span class="aicon">🔗</span>数据同步 / 导入导出</button>
        <button class="action-btn logout-red" onclick="doLogout()"><span class="aicon">🚪</span>退出登录</button>
      </div>
    </div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-tab active" id="navCal" onclick="showTab('calendar')"><div class="nav-icon">📅</div><div class="nav-label">日历</div></button>
    <button class="nav-tab" id="navFeed" onclick="showTab('feed')"><div class="nav-icon">📋</div><div class="nav-label">动态</div></button>
    <button class="nav-tab" id="navProfile" onclick="showTab('profile')"><div class="nav-icon">👤</div><div class="nav-label">我的</div></button>
  </nav>
</div>

<div class="modal-bg hidden" id="modalAdd">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="addModalTitle">添加记录</div>
    <div class="form-block"><label class="form-label">心情</label><div class="mood-grid" id="moodGrid"></div></div>
    <div class="form-block"><label class="form-label">时间</label><input class="input-field" type="time" id="entryTime"/></div>
    <div class="form-block"><label class="form-label">备注（可选）</label><textarea class="input-field" id="entryNote" placeholder="写下今天的心情…" maxlength="300"></textarea></div>
    <div class="btn-row"><button class="btn-secondary" onclick="closeAdd()">取消</button><button class="btn-primary" onclick="saveEntry()">保存记录</button></div>
  </div>
</div>

<div class="modal-bg hidden" id="modalView">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="ve-center"><div class="ve-emoji" id="veEmoji"></div><div class="ve-mood" id="veMood"></div></div>
    <div class="ve-box">
      <div class="ve-row"><span class="ve-author" id="veAuthor"></span><span class="ve-time" id="veTime"></span></div>
      <div id="veText"></div>
    </div>
    <div class="btn-row" id="veActions"></div>
  </div>
</div>

<div class="modal-bg hidden" id="modalSync">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">数据同步</div>
    <div class="sync-tabs">
      <button class="sync-tab active" onclick="setSyncTab('export')">导出数据</button>
      <button class="sync-tab" onclick="setSyncTab('import')">导入数据</button>
    </div>
    <div id="syncExport">
      <p class="sync-note">复制同步码发给对方，对方在「导入数据」中粘贴即可合并记录。</p>
      <div class="sync-code-box" id="exportCode"></div>
      <div class="btn-row"><button class="btn-secondary" onclick="closeSync()">关闭</button><button class="btn-primary" onclick="copyCode()">复制同步码</button></div>
    </div>
    <div id="syncImport" style="display:none">
      <p class="sync-note">粘贴从对方处获得的同步码，系统将合并记录（不覆盖已有数据）。</p>
      <textarea class="input-field" id="importCode" placeholder="粘贴同步码…" style="min-height:90px;margin-bottom:12px"></textarea>
      <div class="btn-row"><button class="btn-secondary" onclick="closeSync()">取消</button><button class="btn-primary" onclick="doImport()">合并导入</button></div>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
const MOODS=[{emoji:"😊",label:"开心"},{emoji:"😌",label:"平静"},{emoji:"😢",label:"难过"},{emoji:"😤",label:"生气"},{emoji:"😴",label:"疲惫"},{emoji:"🥰",label:"幸福"},{emoji:"😰",label:"焦虑"},{emoji:"🤩",label:"兴奋"}];
const UC=["#e8a598","#8fb8d1","#98c9a3","#c9b1d0","#d4a96a","#89b4a8","#d18fa8","#9aadce"];
const DAYS=["日","一","二","三","四","五","六"];
const MONTHS=["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
const uc=n=>{let h=0;for(let i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))%UC.length;return UC[h];};
const p2=n=>String(n).padStart(2,'0');
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;};
const nowTime=()=>{const d=new Date();return `${p2(d.getHours())}:${p2(d.getMinutes())}`;};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
let username=localStorage.getItem('daily_user')||'';
let entries=[];
let vY=new Date().getFullYear(),vM=new Date().getMonth();
let selDay=null,selMood=MOODS[0],curTab='calendar',syncIv=null;
function load(){try{const r=localStorage.getItem('daily_entries');entries=r?JSON.parse(r):[];}catch{entries=[];}}
function save(){try{localStorage.setItem('daily_entries',JSON.stringify(entries));}catch{toast('存储空间不足');}}
function merge(arr){const ids=new Set(entries.map(e=>e.id));let n=0;arr.forEach(e=>{if(!ids.has(e.id)){entries.push(e);n++;}});entries.sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));save();renderAll();return n;}
function doLogin(){const name=document.getElementById('loginInput').value.trim();if(!name)return;username=name;localStorage.setItem('daily_user',name);document.getElementById('screen-login').classList.add('hidden');document.getElementById('screen-app').classList.remove('hidden');initApp();}
document.getElementById('loginInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function doLogout(){username='';localStorage.removeItem('daily_user');clearInterval(syncIv);document.getElementById('screen-app').classList.add('hidden');document.getElementById('screen-login').classList.remove('hidden');document.getElementById('loginInput').value='';showTab('calendar');}
function initApp(){document.getElementById('topName').textContent=username;document.getElementById('topDot').style.background=uc(username);load();buildMoodGrid();document.getElementById('entryTime').value=nowTime();renderAll();clearInterval(syncIv);syncIv=setInterval(()=>{load();renderAll();},8000);window.addEventListener('storage',e=>{if(e.key==='daily_entries'){load();renderAll();}});}
function renderAll(){renderCalendar();renderDayPanel();renderFeed();if(curTab==='profile')renderProfile();}
function renderCalendar(){
  document.getElementById('calTitle').textContent=`${vY} 年 ${MONTHS[vM]}`;
  const pfx=`${vY}-${p2(vM+1)}`;const mE=entries.filter(e=>e.date.startsWith(pfx));
  const authors=[...new Set(mE.map(e=>e.author))];
  const legend=document.getElementById('calLegend');legend.style.display=authors.length?'flex':'none';
  legend.innerHTML=authors.map(a=>`<div class="legend-item"><div class="legend-dot" style="background:${uc(a)}"></div><span class="legend-name">${esc(a)}</span></div>`).join('');
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  DAYS.forEach(d=>{const el=document.createElement('div');el.className='cal-wday';el.textContent=d;grid.appendChild(el);});
  const first=new Date(vY,vM,1).getDay(),days=new Date(vY,vM+1,0).getDate(),td=todayStr();
  for(let i=0;i<first;i++){const el=document.createElement('div');el.className='day-cell empty';grid.appendChild(el);}
  for(let d=1;d<=days;d++){
    const ds=`${vY}-${p2(vM+1)}-${p2(d)}`,de=entries.filter(e=>e.date===ds);
    const cell=document.createElement('div');
    cell.className='day-cell'+(ds===td?' today':'')+(d===selDay?' selected':'');
    const num=document.createElement('span');num.className='dnum'+(ds===td?' is-today':'');num.textContent=d;cell.appendChild(num);
    if(de.length){
      const eg=document.createElement('div'),show=de.slice(0,4);
      eg.className='emoji-grid'+(show.length===1?' s1':'');
      show.forEach(e=>{const sp=document.createElement('span');sp.className='cell-emoji';sp.title=e.author;sp.textContent=e.mood.emoji;eg.appendChild(sp);});
      if(de.length>4){const m=document.createElement('div');m.className='more-badge';m.textContent=`+${de.length-4}`;eg.appendChild(m);}
      cell.appendChild(eg);
    }
    cell.onclick=()=>selectDay(d);grid.appendChild(cell);
  }
}
function selectDay(d){selDay=(d===selDay)?null:d;renderCalendar();const panel=document.getElementById('dayPanel');panel.style.display=selDay?'block':'none';renderDayPanel();if(selDay)setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'nearest'}),50);}
function renderDayPanel(){if(!selDay)return;const ds=`${vY}-${p2(vM+1)}-${p2(selDay)}`,de=entries.filter(e=>e.date===ds).sort((a,b)=>a.time.localeCompare(b.time));document.getElementById('dayTitle').textContent=`${vY}年${vM+1}月${selDay}日`;document.getElementById('dayCount').textContent=`${de.length} 条`;const cont=document.getElementById('dayEntries');cont.innerHTML='';de.forEach(e=>{const c=document.createElement('div');c.className='entry-card';c.style.borderLeftColor=uc(e.author);c.innerHTML=`<div class="ec-top"><span class="ec-emoji">${e.mood.emoji}</span><div class="ec-info"><div class="ec-author" style="color:${uc(e.author)}">${esc(e.author)}</div><div class="ec-meta">${e.time} · ${e.mood.label}</div></div></div>${e.note?`<div class="ec-note">${esc(e.note)}</div>`:''}`;c.onclick=()=>openView(e);cont.appendChild(c);});}
function renderFeed(){const s=[...entries].sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));rFL('feedList',s.slice(0,8));rFL('allFeedList',s);}
function rFL(id,list){const el=document.getElementById(id);el.innerHTML='';if(!list.length){el.innerHTML='<div style="text-align:center;padding:20px 0;font-size:.82rem;color:var(--light)">暂无记录 ✨</div>';return;}list.forEach(e=>{const item=document.createElement('div');item.className='feed-item';item.innerHTML=`<span class="fi-emoji">${e.mood.emoji}</span><div class="fi-main"><div class="fi-author" style="color:${uc(e.author)}">${esc(e.author)}</div><div class="fi-note">${esc(e.note||e.mood.label)}</div></div><div class="fi-right"><div class="fi-date">${e.date.slice(5)}</div><div class="fi-time">${e.time}</div></div>`;item.onclick=()=>openView(e);el.appendChild(item);});}
function renderProfile(){const color=uc(username);const av=document.getElementById('profileAvatar');av.style.background=`linear-gradient(135deg,${color},${color}aa)`;av.textContent=username.charAt(0).toUpperCase();document.getElementById('profileName').textContent=username;const mine=entries.filter(e=>e.author===username);const days=new Set(entries.map(e=>e.date)).size;document.getElementById('statTotal').textContent=entries.length;document.getElementById('statMine').textContent=mine.length;document.getElementById('statDays').textContent=days;}
function changeMonth(dir){vM+=dir;if(vM<0){vM=11;vY--;}if(vM>11){vM=0;vY++;}selDay=null;document.getElementById('dayPanel').style.display='none';renderCalendar();}
function showTab(tab){curTab=tab;['calendar','feed','profile'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'block':'none');document.getElementById('navCal').classList.toggle('active',tab==='calendar');document.getElementById('navFeed').classList.toggle('active',tab==='feed');document.getElementById('navProfile').classList.toggle('active',tab==='profile');document.getElementById('scrollArea').scrollTo({top:0,behavior:'smooth'});if(tab==='profile')renderProfile();if(tab==='feed')renderFeed();}
function buildMoodGrid(){const g=document.getElementById('moodGrid');g.innerHTML='';MOODS.forEach(m=>{const b=document.createElement('button');b.className='mood-btn'+(m===selMood?' active':'');b.innerHTML=`<span class="mb-emoji">${m.emoji}</span><span class="mb-label">${m.label}</span>`;b.onclick=()=>{selMood=m;document.querySelectorAll('.mood-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');};g.appendChild(b);});}
function openAdd(){if(!selDay)return;document.getElementById('addModalTitle').textContent=`${vY}/${vM+1}/${selDay} 的记录`;document.getElementById('entryNote').value='';document.getElementById('entryTime').value=nowTime();selMood=MOODS[0];buildMoodGrid();openM('modalAdd');}
function closeAdd(){closeM('modalAdd');}
function saveEntry(){if(!selDay)return;const e={id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),date:`${vY}-${p2(vM+1)}-${p2(selDay)}`,time:document.getElementById('entryTime').value||'00:00',mood:{emoji:selMood.emoji,label:selMood.label},note:document.getElementById('entryNote').value.trim(),author:username,createdAt:new Date().toISOString()};entries.unshift(e);entries.sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));save();closeAdd();renderAll();toast('✨ 记录已保存');}
function openView(e){document.getElementById('veEmoji').textContent=e.mood.emoji;document.getElementById('veMood').textContent=e.mood.label;document.getElementById('veAuthor').textContent=e.author;document.getElementById('veAuthor').style.color=uc(e.author);document.getElementById('veTime').textContent=`${e.date} ${e.time}`;document.getElementById('veText').innerHTML=e.note?`<p class="ve-text">${esc(e.note)}</p>`:'<p class="ve-empty">无备注</p>';const act=document.getElementById('veActions');act.innerHTML='';if(e.author===username){const d=document.createElement('button');d.className='btn-danger';d.textContent='删除';d.onclick=()=>{entries=entries.filter(x=>x.id!==e.id);save();closeM('modalView');renderAll();toast('已删除');};act.appendChild(d);}const cl=document.createElement('button');cl.className='btn-primary';cl.textContent='关闭';cl.onclick=()=>closeM('modalView');act.appendChild(cl);openM('modalView');}
function openSync(){document.getElementById('exportCode').textContent=btoa(encodeURIComponent(JSON.stringify(entries)));setSyncTab('export');openM('modalSync');}
function closeSync(){closeM('modalSync');}
function setSyncTab(t){document.querySelectorAll('.sync-tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='export')||(i===1&&t==='import')));document.getElementById('syncExport').style.display=t==='export'?'block':'none';document.getElementById('syncImport').style.display=t==='import'?'block':'none';}
function copyCode(){const code=document.getElementById('exportCode').textContent;if(navigator.clipboard){navigator.clipboard.writeText(code).then(()=>toast('✅ 已复制')).catch(()=>fbCopy(code));}else{fbCopy(code);}}
function fbCopy(text){const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:0;left:0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('✅ 已复制');}catch{toast('请手动长按复制');}document.body.removeChild(ta);}
function doImport(){const raw=document.getElementById('importCode').value.trim();if(!raw)return;try{const n=merge(JSON.parse(decodeURIComponent(atob(raw))));closeSync();toast(`✅ 合并了 ${n} 条新记录`);}catch{toast('⚠️ 同步码无效');}}
function openM(id){document.getElementById(id).classList.remove('hidden');}
function closeM(id){document.getElementById(id).classList.add('hidden');}
document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.add('hidden');}));
let tT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.remove('hidden');clearTimeout(tT);tT=setTimeout(()=>el.classList.add('hidden'),2400);}
if(username){document.getElementById('screen-login').classList.add('hidden');document.getElementById('screen-app').classList.remove('hidden');initApp();}
else{setTimeout(()=>document.getElementById('loginInput').focus(),300);}
</script>
</body>
</html>
