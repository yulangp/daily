<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="daily"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#d4957a"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<title>daily</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --serif:Georgia,"Times New Roman","Songti SC","SimSun",serif;
  --sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
  --cream:#fef6ec;--peach:#fde8e0;--rose:#e8a598;--terra:#d4957a;
  --brown:#5a3e36;--mid:#8a6050;--light:#c0a090;--lavender:#f0e6f6;
  --green:#6ab87a;--red:#d06060;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--cream);color:var(--brown);overscroll-behavior:none;}
.screen{position:fixed;inset:0;transition:opacity .3s,transform .3s;
  background:linear-gradient(160deg,var(--cream) 0%,var(--peach) 52%,var(--lavender) 100%);}
.screen.hidden{opacity:0!important;pointer-events:none!important;transform:translateY(16px)!important;}
.center-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;padding:32px 24px;padding-top:calc(var(--safe-top) + 32px);overflow-y:auto;}
.big-icon{font-size:3.6rem;margin-bottom:10px;}
.brand{font-family:var(--serif);font-size:2.6rem;color:var(--brown);font-style:italic;margin-bottom:5px;}
.sub{font-size:.8rem;color:var(--light);margin-bottom:36px;letter-spacing:.07em;}
.form-box{width:100%;max-width:380px;}
.flabel{font-size:.67rem;color:var(--mid);letter-spacing:.09em;text-transform:uppercase;margin-bottom:8px;display:block;}
.ifield{width:100%;border:1.5px solid rgba(212,149,122,.3);border-radius:16px;
  padding:14px 16px;font-size:.95rem;font-family:var(--sans);
  background:rgba(255,255,255,.72);color:var(--brown);outline:none;
  -webkit-appearance:none;transition:border-color .2s,box-shadow .2s;margin-bottom:12px;}
.ifield:focus{border-color:var(--terra);box-shadow:0 0 0 3px rgba(212,149,122,.13);}
.big-btn{width:100%;padding:15px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--rose),var(--terra));
  color:#fff;font-size:.96rem;font-family:var(--sans);font-weight:600;
  cursor:pointer;box-shadow:0 7px 22px rgba(212,149,122,.4);-webkit-appearance:none;
  letter-spacing:.04em;margin-top:4px;}
.big-btn:active{opacity:.85;}
.hint{font-size:.73rem;color:var(--light);text-align:center;line-height:1.7;margin-top:14px;}
.hint span{display:inline-block;background:rgba(212,149,122,.1);border-radius:9px;padding:7px 13px;}
.sync-status{display:flex;align-items:center;gap:6px;font-size:.72rem;padding:6px 12px;
  border-radius:50px;background:rgba(255,255,255,.7);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background .4s;}
.sync-dot.online{background:var(--green);}
.sync-dot.offline{background:#ccc;}
.sync-dot.syncing{background:var(--terra);animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* APP SHELL */
#screen-app{display:flex;flex-direction:column;}
.status-bar{height:var(--safe-top);flex-shrink:0;}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:12px 15px 7px;flex-shrink:0;}
.app-brand{font-family:var(--serif);font-size:1.55rem;color:var(--brown);font-style:italic;}
.top-right{display:flex;align-items:center;gap:8px;}
.user-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.72);
  border-radius:50px;padding:6px 13px;box-shadow:0 2px 9px rgba(0,0,0,.07);cursor:pointer;}
.user-pill:active{background:rgba(255,220,210,.8);}
.u-dot{width:8px;height:8px;border-radius:50%;}
.u-name{font-size:.78rem;color:var(--brown);max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 13px 14px;}
.card{background:rgba(255,255,255,.78);border-radius:22px;padding:16px;
  box-shadow:0 5px 22px rgba(180,120,100,.11);margin-bottom:11px;}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}
.cal-month{font-family:var(--serif);font-size:1.06rem;color:var(--brown);}
.nav-arrow{background:rgba(240,220,210,.5);border:none;border-radius:11px;
  width:33px;height:33px;font-size:1.1rem;color:var(--mid);cursor:pointer;
  display:flex;align-items:center;justify-content:center;}
.nav-arrow:active{background:rgba(212,149,122,.25);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-wday{text-align:center;font-size:.59rem;color:var(--light);padding:1px 0 6px;}
.day-cell{display:flex;flex-direction:column;align-items:center;
  border-radius:11px;cursor:pointer;padding:4px 1px 3px;min-height:50px;
  user-select:none;transition:background .1s;}
.day-cell:active{transform:scale(.91);}
.day-cell.today{background:rgba(232,165,152,.18);}
.day-cell.selected{background:linear-gradient(135deg,var(--rose),var(--terra))!important;
  box-shadow:0 4px 12px rgba(212,149,122,.42);}
.day-cell.selected .dnum{color:#fff!important;font-weight:700;}
.day-cell.empty{cursor:default;pointer-events:none;}
.dnum{font-size:.72rem;color:var(--brown);line-height:1;margin-bottom:2px;}
.dnum.is-today{color:var(--terra);font-weight:700;}
.emoji-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;width:100%;flex:1;}
.emoji-grid.s1{grid-template-columns:1fr;}
.cell-emoji{font-size:.8rem;line-height:1;text-align:center;
  background:rgba(255,255,255,.42);border-radius:4px;padding:1px 0;position:relative;}
.cell-emoji.has-img::after{content:'';position:absolute;top:1px;right:1px;
  width:4px;height:4px;background:var(--terra);border-radius:50%;}
.day-cell.selected .cell-emoji{background:rgba(255,255,255,.2);}
.more-badge{font-size:.46rem;color:var(--mid);text-align:center;
  background:rgba(255,255,255,.5);border-radius:3px;padding:1px;grid-column:1/-1;}
.day-cell.selected .more-badge{color:rgba(255,255,255,.8);}
.legend-strip{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px;}
.legend-item{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.6);
  border-radius:50px;padding:3px 8px;}
.legend-dot{width:6px;height:6px;border-radius:50%;}
.legend-name{font-size:.65rem;color:var(--mid);}

/* ENTRY CARD */
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.day-title{font-family:var(--serif);font-size:.96rem;color:var(--brown);}
.day-count{font-size:.69rem;color:var(--light);}
.add-fab{width:100%;padding:11px;border:1.5px dashed rgba(212,149,122,.45);
  border-radius:13px;background:transparent;color:var(--terra);
  font-size:.83rem;font-family:var(--sans);cursor:pointer;margin-bottom:9px;}
.add-fab:active{background:rgba(212,149,122,.09);}
.entry-card{background:rgba(255,248,244,.9);border-radius:13px;padding:11px;
  margin-bottom:7px;border-left:3px solid;cursor:pointer;}
.entry-card:active{transform:scale(.98);}
.ec-top{display:flex;align-items:center;gap:8px;}
.ec-emoji{font-size:1.35rem;}
.ec-info{flex:1;}
.ec-author{font-size:.75rem;font-weight:600;}
.ec-meta{font-size:.68rem;color:var(--mid);margin-top:1px;}
.ec-note{font-size:.79rem;color:#6a4e45;margin-top:6px;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
/* Thumbnail strip in entry card */
.ec-thumbs{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.ec-thumb{width:56px;height:56px;border-radius:8px;object-fit:cover;
  background:rgba(212,149,122,.1);flex-shrink:0;}

/* FEED */
.section-label{font-size:.64rem;color:var(--light);letter-spacing:.08em;text-transform:uppercase;margin:0 0 7px;}
.feed-item{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.6);
  border-radius:12px;padding:10px 11px;margin-bottom:6px;cursor:pointer;}
.feed-item:active{transform:scale(.98);}
.fi-emoji{font-size:1.12rem;}
.fi-main{flex:1;min-width:0;}
.fi-author{font-size:.75rem;font-weight:600;}
.fi-note{font-size:.7rem;color:var(--mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px;}
.fi-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.fi-date{font-size:.67rem;color:var(--light);}
.fi-time{font-size:.65rem;color:var(--light);}
.fi-img-badge{font-size:.6rem;color:var(--terra);background:rgba(232,165,152,.18);
  border-radius:4px;padding:1px 4px;}

/* PROFILE */
.profile-avatar{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-family:var(--serif);font-size:1.65rem;color:#fff;margin:4px auto 11px;}
.profile-name{text-align:center;font-family:var(--serif);font-size:1.1rem;color:var(--brown);margin-bottom:3px;}
.profile-sub{text-align:center;font-size:.74rem;color:var(--light);margin-bottom:20px;}
.stat-row{display:flex;gap:8px;margin-bottom:14px;}
.stat-box{flex:1;background:rgba(255,255,255,.7);border-radius:14px;padding:13px 7px;text-align:center;}
.stat-num{font-family:var(--serif);font-size:1.4rem;color:var(--terra);}
.stat-lbl{font-size:.63rem;color:var(--light);margin-top:2px;}
.action-btn{width:100%;padding:13px;border-radius:13px;border:1.5px solid rgba(212,149,122,.26);
  background:transparent;color:var(--mid);font-family:var(--sans);font-size:.84rem;
  cursor:pointer;text-align:left;display:flex;align-items:center;gap:11px;margin-bottom:8px;}
.action-btn:active{background:rgba(212,149,122,.09);}
.aicon{font-size:.98rem;}
.logout-red{color:var(--red);border-color:rgba(200,80,80,.19);}

/* BOTTOM NAV */
.bottom-nav{display:flex;border-top:1px solid rgba(212,149,122,.11);
  background:rgba(255,252,248,.95);padding-bottom:calc(var(--safe-bot) + 2px);flex-shrink:0;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:9px 4px;cursor:pointer;color:var(--light);border:none;background:none;font-family:var(--sans);}
.nav-tab.active{color:var(--terra);}
.nav-icon{font-size:1.2rem;line-height:1;}
.nav-label{font-size:.57rem;margin-top:3px;}

/* MODALS */
.modal-bg{position:fixed;inset:0;background:rgba(80,50,40,.34);
  display:flex;align-items:flex-end;justify-content:center;z-index:200;transition:opacity .25s;}
.modal-bg.hidden{opacity:0!important;pointer-events:none!important;}
.modal-sheet{background:#fff9f5;border-radius:26px 26px 0 0;
  padding:0 18px;padding-bottom:calc(var(--safe-bot) + 18px);
  width:100%;max-height:94vh;overflow-y:auto;
  transform:translateY(0);transition:transform .3s cubic-bezier(.32,.72,0,1);-webkit-overflow-scrolling:touch;}
.modal-bg.hidden .modal-sheet{transform:translateY(100%);}
.modal-handle{width:36px;height:4px;background:rgba(0,0,0,.1);border-radius:2px;margin:12px auto 16px;}
.modal-title{font-family:var(--serif);font-size:1.06rem;color:var(--brown);margin-bottom:17px;}
.form-label{font-size:.65rem;color:var(--mid);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;display:block;}
.form-block{margin-bottom:15px;}
.mood-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.mood-btn{border:1.5px solid transparent;border-radius:11px;padding:9px 3px;
  background:rgba(240,225,215,.34);cursor:pointer;text-align:center;
  display:flex;flex-direction:column;align-items:center;}
.mood-btn:active{transform:scale(.91);}
.mood-btn.active{border-color:var(--terra);background:rgba(232,165,152,.21);}
.mb-emoji{font-size:1.45rem;}
.mb-label{font-size:.6rem;color:var(--mid);margin-top:3px;}
.input-field{width:100%;border:1.5px solid rgba(212,149,122,.26);border-radius:13px;
  padding:12px 14px;font-size:.92rem;font-family:var(--sans);
  background:rgba(255,248,244,.8);color:var(--brown);outline:none;-webkit-appearance:none;transition:border-color .2s;}
.input-field:focus{border-color:var(--terra);}
textarea.input-field{resize:none;min-height:78px;line-height:1.55;}
.btn-row{display:flex;gap:8px;margin-top:5px;}
.btn-primary{flex:1;padding:13px;border:none;border-radius:13px;
  background:linear-gradient(135deg,var(--rose),var(--terra));color:#fff;
  font-size:.88rem;font-family:var(--sans);font-weight:600;cursor:pointer;
  box-shadow:0 4px 15px rgba(212,149,122,.33);}
.btn-primary:active{opacity:.87;}
.btn-secondary{padding:13px 15px;border:1.5px solid rgba(212,149,122,.26);border-radius:13px;
  background:transparent;color:var(--mid);font-family:var(--sans);font-size:.86rem;cursor:pointer;}
.btn-secondary:active{background:rgba(240,220,210,.3);}
.btn-danger{padding:13px 13px;border:1.5px solid rgba(220,80,80,.21);border-radius:13px;
  background:transparent;color:var(--red);font-family:var(--sans);font-size:.84rem;cursor:pointer;}
.btn-danger:active{background:rgba(220,80,80,.07);}

/* ── IMAGE UPLOAD UI ── */
.img-upload-area{
  border:1.5px dashed rgba(212,149,122,.4);border-radius:14px;
  padding:14px;background:rgba(255,248,244,.6);cursor:pointer;
  transition:border-color .2s,background .2s;
}
.img-upload-area:active,.img-upload-area.drag-over{
  border-color:var(--terra);background:rgba(232,165,152,.12);
}
.img-upload-inner{display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none;}
.img-upload-icon{font-size:1.6rem;}
.img-upload-text{font-size:.78rem;color:var(--mid);}
.img-upload-sub{font-size:.66rem;color:var(--light);}
/* Preview grid */
.img-preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px;}
.img-preview-wrap{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;
  background:rgba(212,149,122,.1);}
.img-preview-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.img-preview-wrap .del-img{
  position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;
  background:rgba(80,40,30,.7);border:none;color:#fff;font-size:.7rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;
}
.img-preview-wrap .del-img:active{background:rgba(200,60,60,.9);}
.img-upload-loading{display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:.75rem;color:var(--mid);padding:8px 0;}
.spinner{width:14px;height:14px;border:2px solid rgba(212,149,122,.3);
  border-top-color:var(--terra);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* View entry */
.ve-center{text-align:center;padding:6px 0 16px;}
.ve-emoji{font-size:3rem;}
.ve-mood{font-family:var(--serif);font-size:.96rem;color:var(--brown);margin-top:5px;}
.ve-box{background:rgba(240,225,215,.2);border-radius:13px;padding:13px;margin-bottom:14px;}
.ve-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.ve-author{font-size:.76rem;font-weight:600;}
.ve-time{font-size:.72rem;color:var(--mid);}
.ve-text{font-size:.84rem;color:var(--brown);line-height:1.65;white-space:pre-wrap;}
.ve-empty{font-size:.8rem;color:var(--light);font-style:italic;}
/* Full-size image gallery in view modal */
.ve-images{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.ve-img{width:100%;border-radius:12px;object-fit:cover;max-height:260px;cursor:pointer;display:block;}

/* Fullscreen image lightbox */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:16px;}
#lightbox.hidden{display:none;}
#lightboxImg{max-width:100%;max-height:100%;border-radius:10px;object-fit:contain;}
#lightboxClose{position:absolute;top:calc(var(--safe-top) + 14px);right:16px;
  background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;
  border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Toast */
.toast{position:fixed;bottom:calc(var(--safe-bot) + 68px);left:50%;
  transform:translateX(-50%) translateY(0);background:rgba(90,62,54,.92);color:#fff;
  padding:9px 19px;border-radius:50px;font-size:.8rem;z-index:999;
  transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;}
.toast.hidden{opacity:0;transform:translateX(-50%) translateY(10px);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen">
  <div class="center-wrap">
    <div class="big-icon">📖</div>
    <div class="brand">daily</div>
    <div class="sub">record every mood · every moment</div>
    <div class="form-box">
      <label class="flabel">你的昵称</label>
      <input class="ifield" id="loginInput" placeholder="输入昵称…" maxlength="20" autocomplete="off" inputmode="text"/>
      <button class="big-btn" onclick="doLogin()">开始记录 →</button>
      <div class="hint"><span>🔗 共享日历 · 所有成员实时同步</span></div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="screen-app" class="screen hidden">
  <div class="status-bar"></div>
  <div class="topnav">
    <span class="app-brand">daily</span>
    <div class="top-right">
      <div class="sync-status" id="syncStatus">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncLabel">离线</span>
      </div>
      <div class="user-pill" onclick="showTab('profile')">
        <div class="u-dot" id="topDot"></div>
        <span class="u-name" id="topName"></span>
      </div>
    </div>
  </div>
  <div class="scroll-area" id="scrollArea">

    <!-- CALENDAR TAB -->
    <div id="tab-calendar">
      <div class="card">
        <div class="cal-nav">
          <button class="nav-arrow" onclick="changeMonth(-1)">‹</button>
          <span class="cal-month" id="calTitle"></span>
          <button class="nav-arrow" onclick="changeMonth(1)">›</button>
        </div>
        <div class="legend-strip" id="calLegend"></div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
      <div class="card" id="dayPanel" style="display:none">
        <div class="day-header">
          <span class="day-title" id="dayTitle"></span>
          <span class="day-count" id="dayCount"></span>
        </div>
        <button class="add-fab" onclick="openAdd()">＋ 添加今天的记录</button>
        <div id="dayEntries"></div>
      </div>
      <div class="card">
        <div class="section-label">最近动态</div>
        <div id="feedList"></div>
      </div>
    </div>

    <!-- FEED TAB -->
    <div id="tab-feed" style="display:none">
      <div class="card">
        <div class="section-label">全部记录</div>
        <div id="allFeedList"></div>
      </div>
    </div>

    <!-- PROFILE TAB -->
    <div id="tab-profile" style="display:none">
      <div class="card">
        <div class="profile-avatar" id="profileAvatar"></div>
        <div class="profile-name" id="profileName"></div>
        <div class="profile-sub">daily 共享日历成员</div>
        <div class="stat-row">
          <div class="stat-box"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">总记录</div></div>
          <div class="stat-box"><div class="stat-num" id="statMine">0</div><div class="stat-lbl">我的</div></div>
          <div class="stat-box"><div class="stat-num" id="statDays">0</div><div class="stat-lbl">记录天数</div></div>
        </div>
        <button class="action-btn logout-red" onclick="doLogout()"><span class="aicon">🚪</span>退出登录</button>
      </div>
    </div>

  </div>
  <nav class="bottom-nav">
    <button class="nav-tab active" id="navCal" onclick="showTab('calendar')"><div class="nav-icon">📅</div><div class="nav-label">日历</div></button>
    <button class="nav-tab" id="navFeed" onclick="showTab('feed')"><div class="nav-icon">📋</div><div class="nav-label">动态</div></button>
    <button class="nav-tab" id="navProfile" onclick="showTab('profile')"><div class="nav-icon">👤</div><div class="nav-label">我的</div></button>
  </nav>
</div>

<!-- ADD MODAL -->
<div class="modal-bg hidden" id="modalAdd">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="addModalTitle">添加记录</div>

    <div class="form-block">
      <label class="form-label">心情</label>
      <div class="mood-grid" id="moodGrid"></div>
    </div>
    <div class="form-block">
      <label class="form-label">时间</label>
      <input class="input-field" type="time" id="entryTime"/>
    </div>
    <div class="form-block">
      <label class="form-label">备注（可选）</label>
      <textarea class="input-field" id="entryNote" placeholder="写下今天的心情…" maxlength="300"></textarea>
    </div>

    <!-- IMAGE UPLOAD -->
    <div class="form-block">
      <label class="form-label">照片（最多 4 张）</label>
      <div class="img-upload-area" id="imgUploadArea" onclick="triggerImgPick()">
        <div class="img-upload-inner">
          <div class="img-upload-icon">📷</div>
          <div class="img-upload-text">点击上传照片</div>
          <div class="img-upload-sub">支持 JPG / PNG · 自动压缩</div>
        </div>
      </div>
      <div id="imgLoadingRow" class="img-upload-loading" style="display:none">
        <div class="spinner"></div><span>压缩中…</span>
      </div>
      <div class="img-preview-grid" id="imgPreviewGrid"></div>
      <input type="file" id="imgFileInput" accept="image/*" multiple style="display:none" onchange="handleImgFiles(this.files)"/>
    </div>

    <div class="btn-row">
      <button class="btn-secondary" onclick="closeAdd()">取消</button>
      <button class="btn-primary" id="saveBtn" onclick="saveEntry()">保存记录</button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="modal-bg hidden" id="modalView">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="ve-center"><div class="ve-emoji" id="veEmoji"></div><div class="ve-mood" id="veMood"></div></div>
    <div class="ve-box">
      <div class="ve-row"><span class="ve-author" id="veAuthor"></span><span class="ve-time" id="veTime"></span></div>
      <div id="veText"></div>
      <div class="ve-images" id="veImages"></div>
    </div>
    <div class="btn-row" id="veActions"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" class="hidden">
  <button id="lightboxClose" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<div class="toast hidden" id="toast"></div>

<script>
// ══ CONSTANTS ═════════════════════════════════════════════════
const MOODS=[{emoji:"😊",label:"开心"},{emoji:"😌",label:"平静"},{emoji:"😢",label:"难过"},
  {emoji:"😤",label:"生气"},{emoji:"😴",label:"疲惫"},{emoji:"🥰",label:"幸福"},
  {emoji:"😰",label:"焦虑"},{emoji:"🤩",label:"兴奋"}];
const UC=["#e8a598","#8fb8d1","#98c9a3","#c9b1d0","#d4a96a","#89b4a8","#d18fa8","#9aadce"];
const DAYS=["日","一","二","三","四","五","六"];
const MONTHS=["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
const MAX_IMG_PX = 1080;   // max side length after resize
const IMG_QUALITY = 0.72;  // JPEG quality
const MAX_IMGS = 4;

// ══ HELPERS ═══════════════════════════════════════════════════
const uc=n=>{let h=0;for(let i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))%UC.length;return UC[h];};
const p2=n=>String(n).padStart(2,'0');
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;};
const nowTime=()=>{const d=new Date();return `${p2(d.getHours())}:${p2(d.getMinutes())}`;};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const show=id=>document.getElementById(id).classList.remove('hidden');
const hide=id=>document.getElementById(id).classList.add('hidden');

// ══ STATE ═════════════════════════════════════════════════════
let username = localStorage.getItem('daily_user') || '';
let entries = [];
let vY = new Date().getFullYear(), vM = new Date().getMonth();
let selDay = null, selMood = MOODS[0], curTab = 'calendar';
let fbApp = null, fbDb = null, fbRef = null, fbListener = null;
let pendingImgs = [];   // base64 strings waiting to be saved

// ══ IMAGE COMPRESSION ═════════════════════════════════════════
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let {width: w, height: h} = img;
        if (w > MAX_IMG_PX || h > MAX_IMG_PX) {
          if (w > h) { h = Math.round(h * MAX_IMG_PX / w); w = MAX_IMG_PX; }
          else { w = Math.round(w * MAX_IMG_PX / h); h = MAX_IMG_PX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', IMG_QUALITY));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function triggerImgPick() {
  if (pendingImgs.length >= MAX_IMGS) { toast(`最多上传 ${MAX_IMGS} 张`); return; }
  document.getElementById('imgFileInput').value = '';
  document.getElementById('imgFileInput').click();
}

async function handleImgFiles(files) {
  const remaining = MAX_IMGS - pendingImgs.length;
  const toProcess = Array.from(files).slice(0, remaining);
  if (!toProcess.length) return;

  document.getElementById('imgLoadingRow').style.display = 'flex';
  document.getElementById('saveBtn').disabled = true;

  try {
    for (const file of toProcess) {
      const b64 = await compressImage(file);
      pendingImgs.push(b64);
    }
  } catch(e) {
    toast('⚠️ 图片处理失败');
  }

  document.getElementById('imgLoadingRow').style.display = 'none';
  document.getElementById('saveBtn').disabled = false;
  renderImgPreviews();
}

function renderImgPreviews() {
  const grid = document.getElementById('imgPreviewGrid');
  grid.innerHTML = '';
  const area = document.getElementById('imgUploadArea');

  pendingImgs.forEach((b64, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'img-preview-wrap';
    const img = document.createElement('img');
    img.src = b64;
    const del = document.createElement('button');
    del.className = 'del-img';
    del.innerHTML = '✕';
    del.onclick = e => { e.stopPropagation(); pendingImgs.splice(i, 1); renderImgPreviews(); };
    wrap.appendChild(img); wrap.appendChild(del);
    grid.appendChild(wrap);
  });

  // Hide upload area when max reached
  area.style.display = pendingImgs.length >= MAX_IMGS ? 'none' : 'block';
}

// Drag-and-drop support
(function(){
  const area = document.getElementById('imgUploadArea');
  area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag-over'); });
  area.addEventListener('dragleave', () => area.classList.remove('drag-over'));
  area.addEventListener('drop', e => {
    e.preventDefault(); area.classList.remove('drag-over');
    handleImgFiles(e.dataTransfer.files);
  });
})();

// ══ FIREBASE ══════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: 'AIzaSyDFllVBcLbWpgl7XoZpo_XxcIFx2PXN-C4',
  authDomain: 'daily-app-a4ff9.firebaseapp.com',
  databaseURL: 'https://daily-app-a4ff9-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId: 'daily-app-a4ff9',
  storageBucket: 'daily-app-a4ff9.firebasestorage.app',
  messagingSenderId: '169369596170',
  appId: '1:169369596170:web:4e20bda5fbefdf72444af3'
};

function initFirebase(config) {
  try {
    if (fbApp) { try { fbApp.delete(); } catch{} }
    fbApp = firebase.initializeApp(config, 'daily-' + Date.now());
    fbDb = firebase.database(fbApp);
    fbRef = fbDb.ref('daily_entries');
    setSyncStatus('syncing', '连接中…');
    if (fbListener) fbRef.off('value', fbListener);
    fbListener = fbRef.on('value', snapshot => {
      const data = snapshot.val();
      if (data) {
        const remote = typeof data === 'object' && !Array.isArray(data)
          ? Object.values(data) : (Array.isArray(data) ? data : []);
        entries = remote.filter(e => e && e.id && e.date);
        entries.sort((a,b) => (b.date+b.time).localeCompare(a.date+a.time));
        saveLocal();
      } else { entries = []; }
      renderAll();
      setSyncStatus('online', '已同步');
    }, err => {
      console.error(err);
      setSyncStatus('offline', '同步失败');
      toast('⚠️ 云端连接失败，使用本地数据');
      loadLocal(); renderAll();
    });
  } catch(e) { console.error(e); setSyncStatus('offline', '离线'); }
}

function writeToFirebase(list) {
  if (!fbRef) return;
  setSyncStatus('syncing', '同步中…');
  const obj = {};
  list.forEach(e => { obj[e.id] = e; });
  fbRef.set(obj)
    .then(() => setSyncStatus('online', '已同步'))
    .catch(err => { console.error(err); toast('⚠️ 同步失败'); setSyncStatus('offline','同步失败'); });
}

function deleteFromFirebase(id) {
  if (!fbRef) return;
  fbRef.child(id).remove().catch(err => console.error(err));
}

// ══ LOCAL STORAGE ═════════════════════════════════════════════
function loadLocal() {
  try { const r = localStorage.getItem('daily_entries'); entries = r ? JSON.parse(r) : []; }
  catch { entries = []; }
}
function saveLocal() {
  try { localStorage.setItem('daily_entries', JSON.stringify(entries)); } catch{}
}
function setSyncStatus(state, label) {
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncLabel').textContent = label;
}

// ══ AUTH ══════════════════════════════════════════════════════
function doLogin() {
  const name = document.getElementById('loginInput').value.trim();
  if (!name) return;
  username = name; localStorage.setItem('daily_user', name);
  hide('screen-login'); show('screen-app');
  initFirebase(FIREBASE_CONFIG);
  initApp();
}
document.getElementById('loginInput').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
function doLogout() {
  username = ''; localStorage.removeItem('daily_user');
  if (fbListener && fbRef) fbRef.off('value', fbListener);
  fbListener = null;
  hide('screen-app'); show('screen-login');
  document.getElementById('loginInput').value = '';
  showTab('calendar');
}
function initApp() {
  document.getElementById('topName').textContent = username;
  document.getElementById('topDot').style.background = uc(username);
  buildMoodGrid();
  document.getElementById('entryTime').value = nowTime();
}

// ══ RENDER ════════════════════════════════════════════════════
function renderAll() {
  renderCalendar(); renderDayPanel(); renderFeed();
  if (curTab === 'profile') renderProfile();
}

function renderCalendar() {
  document.getElementById('calTitle').textContent = `${vY} 年 ${MONTHS[vM]}`;
  const pfx = `${vY}-${p2(vM+1)}`;
  const mE = entries.filter(e => e.date.startsWith(pfx));
  const authors = [...new Set(mE.map(e => e.author))];
  const legend = document.getElementById('calLegend');
  legend.style.display = authors.length ? 'flex' : 'none';
  legend.innerHTML = authors.map(a =>
    `<div class="legend-item"><div class="legend-dot" style="background:${uc(a)}"></div><span class="legend-name">${esc(a)}</span></div>`
  ).join('');

  const grid = document.getElementById('calGrid'); grid.innerHTML = '';
  DAYS.forEach(d => { const el = document.createElement('div'); el.className = 'cal-wday'; el.textContent = d; grid.appendChild(el); });
  const first = new Date(vY,vM,1).getDay(), days = new Date(vY,vM+1,0).getDate(), td = todayStr();
  for(let i=0;i<first;i++){const el=document.createElement('div');el.className='day-cell empty';grid.appendChild(el);}
  for(let d=1;d<=days;d++){
    const ds=`${vY}-${p2(vM+1)}-${p2(d)}`, de=entries.filter(e=>e.date===ds);
    const cell=document.createElement('div');
    cell.className='day-cell'+(ds===td?' today':'')+(d===selDay?' selected':'');
    const num=document.createElement('span'); num.className='dnum'+(ds===td?' is-today':''); num.textContent=d; cell.appendChild(num);
    if(de.length){
      const eg=document.createElement('div'), shown=de.slice(0,4);
      eg.className='emoji-grid'+(shown.length===1?' s1':'');
      shown.forEach(e=>{
        const sp=document.createElement('span');
        sp.className='cell-emoji'+(e.images&&e.images.length?' has-img':'');
        sp.title=e.author; sp.textContent=e.mood.emoji; eg.appendChild(sp);
      });
      if(de.length>4){const m=document.createElement('div');m.className='more-badge';m.textContent=`+${de.length-4}`;eg.appendChild(m);}
      cell.appendChild(eg);
    }
    cell.onclick=()=>selectDay(d); grid.appendChild(cell);
  }
}

function selectDay(d){
  selDay=(d===selDay)?null:d; renderCalendar();
  const panel=document.getElementById('dayPanel'); panel.style.display=selDay?'block':'none';
  renderDayPanel();
  if(selDay) setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function renderDayPanel(){
  if(!selDay) return;
  const ds=`${vY}-${p2(vM+1)}-${p2(selDay)}`, de=entries.filter(e=>e.date===ds).sort((a,b)=>a.time.localeCompare(b.time));
  document.getElementById('dayTitle').textContent=`${vY}年${vM+1}月${selDay}日`;
  document.getElementById('dayCount').textContent=`${de.length} 条`;
  const cont=document.getElementById('dayEntries'); cont.innerHTML='';
  de.forEach(e=>{
    const c=document.createElement('div'); c.className='entry-card'; c.style.borderLeftColor=uc(e.author);
    let thumbsHtml='';
    if(e.images&&e.images.length){
      thumbsHtml='<div class="ec-thumbs">'+e.images.slice(0,3).map(src=>`<img class="ec-thumb" src="${src}" loading="lazy"/>`).join('')+(e.images.length>3?`<div class="ec-thumb" style="display:flex;align-items:center;justify-content:center;font-size:.72rem;color:var(--mid)">+${e.images.length-3}</div>`:'')+'</div>';
    }
    c.innerHTML=`<div class="ec-top"><span class="ec-emoji">${e.mood.emoji}</span><div class="ec-info"><div class="ec-author" style="color:${uc(e.author)}">${esc(e.author)}</div><div class="ec-meta">${e.time} · ${e.mood.label}${e.images&&e.images.length?' · 📷'+e.images.length:''}</div></div></div>${e.note?`<div class="ec-note">${esc(e.note)}</div>`:''}${thumbsHtml}`;
    c.onclick=()=>openView(e); cont.appendChild(c);
  });
}

function renderFeed(){
  const s=[...entries].sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
  rFL('feedList',s.slice(0,10)); rFL('allFeedList',s);
}
function rFL(id,list){
  const el=document.getElementById(id); el.innerHTML='';
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:20px 0;font-size:.8rem;color:var(--light)">暂无记录 ✨</div>';return;}
  list.forEach(e=>{
    const item=document.createElement('div'); item.className='feed-item';
    const imgBadge=e.images&&e.images.length?`<span class="fi-img-badge">📷${e.images.length}</span>`:'';
    item.innerHTML=`<span class="fi-emoji">${e.mood.emoji}</span><div class="fi-main"><div class="fi-author" style="color:${uc(e.author)}">${esc(e.author)}</div><div class="fi-note">${esc(e.note||e.mood.label)}</div></div><div class="fi-right"><div class="fi-date">${e.date.slice(5)}</div><div class="fi-time">${e.time}</div>${imgBadge}</div>`;
    item.onclick=()=>openView(e); el.appendChild(item);
  });
}

function renderProfile(){
  const color=uc(username);
  const av=document.getElementById('profileAvatar');
  av.style.background=`linear-gradient(135deg,${color},${color}aa)`;
  av.textContent=username.charAt(0).toUpperCase();
  document.getElementById('profileName').textContent=username;
  const mine=entries.filter(e=>e.author===username);
  const days=new Set(entries.map(e=>e.date)).size;
  document.getElementById('statTotal').textContent=entries.length;
  document.getElementById('statMine').textContent=mine.length;
  document.getElementById('statDays').textContent=days;
}

// ══ CALENDAR NAV ══════════════════════════════════════════════
function changeMonth(dir){
  vM+=dir; if(vM<0){vM=11;vY--;} if(vM>11){vM=0;vY++;}
  selDay=null; document.getElementById('dayPanel').style.display='none'; renderCalendar();
}

// ══ TABS ══════════════════════════════════════════════════════
function showTab(tab){
  curTab=tab;
  ['calendar','feed','profile'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'block':'none');
  document.getElementById('navCal').classList.toggle('active',tab==='calendar');
  document.getElementById('navFeed').classList.toggle('active',tab==='feed');
  document.getElementById('navProfile').classList.toggle('active',tab==='profile');
  document.getElementById('scrollArea').scrollTo({top:0,behavior:'smooth'});
  if(tab==='profile') renderProfile();
  if(tab==='feed') renderFeed();
}

// ══ MOOD GRID ═════════════════════════════════════════════════
function buildMoodGrid(){
  const g=document.getElementById('moodGrid'); g.innerHTML='';
  MOODS.forEach(m=>{
    const b=document.createElement('button');
    b.className='mood-btn'+(m===selMood?' active':'');
    b.innerHTML=`<span class="mb-emoji">${m.emoji}</span><span class="mb-label">${m.label}</span>`;
    b.onclick=()=>{selMood=m;document.querySelectorAll('.mood-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');};
    g.appendChild(b);
  });
}

// ══ ADD / SAVE ════════════════════════════════════════════════
function openAdd(){
  if(!selDay) return;
  document.getElementById('addModalTitle').textContent=`${vY}/${vM+1}/${selDay} 的记录`;
  document.getElementById('entryNote').value='';
  document.getElementById('entryTime').value=nowTime();
  selMood=MOODS[0]; buildMoodGrid();
  // Reset image state
  pendingImgs=[];
  document.getElementById('imgPreviewGrid').innerHTML='';
  document.getElementById('imgUploadArea').style.display='block';
  document.getElementById('imgLoadingRow').style.display='none';
  document.getElementById('saveBtn').disabled=false;
  openM('modalAdd');
}
function closeAdd(){ closeM('modalAdd'); }

function saveEntry(){
  if(!selDay) return;
  const e={
    id: Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    date: `${vY}-${p2(vM+1)}-${p2(selDay)}`,
    time: document.getElementById('entryTime').value||'00:00',
    mood: {emoji:selMood.emoji, label:selMood.label},
    note: document.getElementById('entryNote').value.trim(),
    author: username,
    createdAt: new Date().toISOString(),
    images: pendingImgs.length ? [...pendingImgs] : null
  };
  entries.unshift(e);
  entries.sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
  saveLocal();
  writeToFirebase(entries);
  closeAdd(); renderAll();
  toast('✨ 已保存' + (e.images ? ` · ${e.images.length}张图片` : ''));
}

// ══ VIEW ══════════════════════════════════════════════════════
function openView(e){
  document.getElementById('veEmoji').textContent=e.mood.emoji;
  document.getElementById('veMood').textContent=e.mood.label;
  document.getElementById('veAuthor').textContent=e.author;
  document.getElementById('veAuthor').style.color=uc(e.author);
  document.getElementById('veTime').textContent=`${e.date} ${e.time}`;
  document.getElementById('veText').innerHTML=e.note?`<p class="ve-text">${esc(e.note)}</p>`:'<p class="ve-empty">无备注</p>';

  // Images
  const imgCont=document.getElementById('veImages'); imgCont.innerHTML='';
  if(e.images&&e.images.length){
    e.images.forEach(src=>{
      const img=document.createElement('img');
      img.className='ve-img'; img.src=src; img.loading='lazy';
      img.onclick=()=>openLightbox(src);
      imgCont.appendChild(img);
    });
  }

  const act=document.getElementById('veActions'); act.innerHTML='';
  if(e.author===username){
    const d=document.createElement('button'); d.className='btn-danger'; d.textContent='删除';
    d.onclick=()=>{
      entries=entries.filter(x=>x.id!==e.id);
      saveLocal(); deleteFromFirebase(e.id);
      closeM('modalView'); renderAll(); toast('已删除');
    };
    act.appendChild(d);
  }
  const cl=document.createElement('button'); cl.className='btn-primary'; cl.textContent='关闭'; cl.onclick=()=>closeM('modalView'); act.appendChild(cl);
  openM('modalView');
}

// ══ LIGHTBOX ══════════════════════════════════════════════════
function openLightbox(src){
  document.getElementById('lightboxImg').src=src;
  show('lightbox');
}
function closeLightbox(){ hide('lightbox'); }
document.getElementById('lightbox').addEventListener('click', e=>{
  if(e.target===document.getElementById('lightbox')) closeLightbox();
});

// ══ MODAL HELPERS ═════════════════════════════════════════════
function openM(id){ document.getElementById(id).classList.remove('hidden'); }
function closeM(id){ document.getElementById(id).classList.add('hidden'); }
document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.add('hidden');}));

// ══ TOAST ═════════════════════════════════════════════════════
let tT;
function toast(msg){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.remove('hidden');
  clearTimeout(tT); tT=setTimeout(()=>el.classList.add('hidden'),2600);
}

// ══ AUTO START ════════════════════════════════════════════════
if(username){
  hide('screen-login'); show('screen-app');
  initFirebase(FIREBASE_CONFIG); initApp();
} else {
  setTimeout(()=>document.getElementById('loginInput').focus(), 300);
}
</script>
</body>
</html>
